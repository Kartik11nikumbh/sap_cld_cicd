name: SAP CAP CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: empsaldetails

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Install CDS DK
        run: npm install -g @sap/cds-dk

      - name: Build CAP Project
        run: cds build

      - name: Install MBT
        run: npm install -g mbt

      - name: Build MTAR
        run: mbt build

      - name: Upload MTAR
        uses: actions/upload-artifact@v4
        with:
          name: mtar-file
          path: empsaldetails/mta_archives/*.mtar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install CF CLI
        run: |
          wget -q -O cf.tgz https://packages.cloudfoundry.org/stable?release=linux64-binary&source=github
          tar -xzf cf.tgz
          sudo mv cf /usr/local/bin

      - name: Login to Cloud Foundry
        run: |
          cf api ${{ secrets.CF_API }}
          cf auth ${{ secrets.CF_USERNAME }} ${{ secrets.CF_PASSWORD }}
          cf target -o ${{ secrets.CF_ORG }} -s ${{ secrets.CF_SPACE }}

      - name: Verify Login
        run: cf target
