ID: employee-cap
_schema-version: '3.3'
version: 1.0.0

modules:

  - name: employee1-cap-srv
    type: nodejs
    path: gen/srv

    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: employee1-cap-auth

  - name: employee1-cap-db-deployer
    type: hdb
    path: gen/db
   
    

resources:

  - name: employee1-db
    type: com.sap.xs.hdi-container
  - name: employee1-cap-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: employee1-cap-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production